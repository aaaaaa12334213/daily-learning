  <!-- 底部导航 -->
  <div style="text-align:center;margin-top:28px;padding:16px;background:#f5f5f5;border-radius:8px;">
    <a href="https://aaaaaa12334213.github.io/daily-learning/pages/ch1-part2.html" style="display:inline-block;padding:8px 20px;background:#e94560;color:#fff;text-decoration:none;border-radius:20px;font-size:14px;margin:4px;">← 上一篇</a> <span style="font-size:14px;color:#888;">本章已完结</span>
  </div>

  <!-- 标记已读按钮 -->
  
  <div style="text-align:center;margin-top:12px;">
    <button id="readBtn" onclick="markRead()" style="padding:8px 24px;background:#4caf50;color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer;">
      ✅ 标记为已读
    </button>
    <div id="readMsg" style="font-size:12px;color:#888;margin-top:6px;display:none;">已标记，推送时将跳过本篇</div>
  </div>
  <script>
    async function markRead() {
      const btn = document.getElementById('readBtn');
      const msg = document.getElementById('readMsg');
      btn.disabled = true;
      btn.textContent = '处理中...';
      try {
        const parts = 'aaaaaa12334213|daily-learning|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'.split('|');
        const owner = parts[0];
        const repo = parts[1];
        const token = parts[2];
        const pageId = '中医内科学评讲|一|3';
        const apiUrl = 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/read_status.json';
        const headers = {
          'Authorization': 'Bearer ' + token,
          'Accept': 'application/vnd.github.v3+json'
        };
        // 获取当前 read_status.json
        let sha = null;
        let content = {};
        try {
          const resp = await fetch(apiUrl, { headers: headers });
          if (resp.ok) {
            const data = await resp.json();
            sha = data.sha;
            content = JSON.parse(atob(data.content));
          } else {
            const errText = await resp.text();
            console.error('GET error:', resp.status, errText);
          }
        } catch(e) {
          console.error('GET fetch error:', e);
        }
        // 更新已读状态
        content[pageId] = { read: true, time: new Date().toISOString() };
        const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
        const body = { message: 'mark read: ' + pageId, content: newContent };
        if (sha) body.sha = sha;
        const putResp = await fetch(apiUrl, {
          method: 'PUT',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        if (putResp.ok) {
          btn.textContent = '✅ 已标记已读';
          btn.style.background = '#999';
          msg.style.display = 'block';
        } else {
          const errText = await putResp.text();
          console.error('PUT error:', putResp.status, errText);
          btn.textContent = '❌ 失败: ' + putResp.status;
          btn.style.background = '#e94560';
          btn.disabled = false;
        }
      } catch(e) {
        console.error('markRead error:', e);
        btn.textContent = '❌ 网络错误';
        btn.style.background = '#e94560';
        btn.disabled = false;
      }
    }
  </script>
  

  <div style="text-align:center;margin-top:14px;">
