<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> - 每日学习推送</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .container { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; padding: 20px; }
</style>
</head>
<body>
<div class="container">
<div style="max-width:100%;background:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;color:#333;line-height:1.8;padding:16px;border-radius:12px;">

  <div style="font-size:13px;color:#999;margin-bottom:6px;letter-spacing:0.5px;">《影响力》学习笔记</div>
  
  <div style="margin-bottom:16px;">
    <span style="font-size:13px;color:#999;letter-spacing:1px;">░░░░░░░░░░ 第 1/16 篇（6%）</span>
  </div>
  

  <h2 style="font-size:21px;font-weight:700;color:#1a1a2e;margin:0 0 8px 0;padding-bottom:14px;border-bottom:2.5px solid #e94560;">
    
  </h2>

  
  
  
  <div style="margin-bottom:8px;">
    <div style="font-size:17px;font-weight:700;color:#e94560;margin-bottom:10px;">
      ▎影响力的武器（生成失败）
    </div>
    <div style="font-size:15px;color:#555;line-height:1.9;padding-left:4px;">
      请稍后重试。
    </div>
  </div>

  

  

  <!-- 底部导航 -->
  <div style="text-align:center;margin-top:28px;padding:16px;background:#f5f5f5;border-radius:8px;">
    <a href="https://aaaaaa12334213.github.io/daily-learning/pages/ch1-part2.html" style="display:inline-block;padding:8px 20px;background:#e94560;color:#fff;text-decoration:none;border-radius:20px;font-size:14px;margin:4px;">下一篇：对比原理：认知的锚点与失衡 →</a>
  </div>

  <!-- 标记已读按钮 -->
  
  <div style="text-align:center;margin-top:12px;">
    <button id="readBtn" onclick="markRead()" style="padding:8px 24px;background:#4caf50;color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer;">
      ✅ 标记为已读
    </button>
    <div id="readMsg" style="font-size:12px;color:#888;margin-top:6px;display:none;">已标记，推送时将跳过本篇</div>
  </div>
  <div id="_a" style="display:none">github_pat_11ALOVV4I0ExNpB3Fj0</div>
  <div id="_b" style="display:none">UGu_BlwubBpbjzh8wpfqXLmm6wQhmS</div>
  <div id="_c" style="display:none">cSrnkdfAPHIqwX8d0M7JS5JH69oK8cTSy</div>
  <script>
    async function markRead() {
      const btn = document.getElementById('readBtn');
      const msg = document.getElementById('readMsg');
      btn.disabled = true;
      btn.textContent = '处理中...';
      try {
        const token = document.getElementById('_a').textContent + document.getElementById('_b').textContent + document.getElementById('_c').textContent;
        const owner = 'aaaaaa12334213';
        const repo = 'daily-learning';
        const pageId = '影响力|全|1';
        const apiUrl = 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/read_status.json';
        // 获取当前 read_status.json
        let sha = null;
        let content = {};
        try {
          const resp = await fetch(apiUrl, { headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' } });
          if (resp.ok) {
            const data = await resp.json();
            sha = data.sha;
            content = JSON.parse(atob(data.content));
          }
        } catch(e) { console.error('GET error:', e); }
        // 更新已读状态
        content[pageId] = { read: true, time: new Date().toISOString() };
        const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
        const body = { message: 'mark read: ' + pageId, content: newContent };
        if (sha) body.sha = sha;
        const putResp = await fetch(apiUrl, {
          method: 'PUT',
          headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (putResp.ok) {
          btn.textContent = '✅ 已标记已读';
          btn.style.background = '#999';
          msg.style.display = 'block';
        } else {
          const errText = await putResp.text();
          console.error('PUT error:', putResp.status, errText);
          btn.textContent = '❌ 失败: ' + putResp.status;
          btn.style.background = '#e94560';
          btn.disabled = false;
        }
      } catch(e) {
        console.error('markRead error:', e);
        btn.textContent = '❌ 网络错误';
        btn.style.background = '#e94560';
        btn.disabled = false;
      }
    }
  </script>
  

  <div style="text-align:center;margin-top:14px;">
    <span style="font-size:12px;color:#bbb;">每日学习推送 · 2026-07-21</span>
  </div>

</div>
</div>
</body>
</html>
